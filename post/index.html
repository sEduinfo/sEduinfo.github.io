<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>성일정보고 학과별 피드보드</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <!-- ✅ 스타일 -->
  <link rel="stylesheet" href="style.css" />

  <!-- ✅ Cropper.js (이미지 자르기용) -->
  <link rel="stylesheet" href="https://unpkg.com/cropperjs@1.5.13/dist/cropper.min.css" />
  <script src="https://unpkg.com/cropperjs@1.5.13/dist/cropper.min.js"></script>

  <!-- ✅ Quill.js (리치 텍스트 에디터) -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

  <!-- ✅ Cloudinary 위젯 -->
  <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
</head>

<body>
  <header>
    <h1>성일정보고등학교<br> 학과별 피드보드</h1>

    <div class="header-controls">
      <div class="auth-area">
        <button id="loginBtn">Google 로그인</button>
        <button id="logoutBtn" style="display:none;">로그아웃</button>
        <button id="openPostModal" class="write-btn" style="display:none;">게시글 작성</button>
      </div>

      <select id="deptSelect" class="dept-select">
        <option value="">학과 선택</option>
        <option value="학부모진로설명회">학부모진로설명회</option>
        <option value="학과체험">학과체험</option>
        <option value="뷰티스마트케어과">뷰티스마트케어과</option>
        <option value="부사관과">부사관과</option>
        <option value="글로벌경영과">글로벌경영과</option>
        <option value="회계정보과">회계정보과</option>
        <option value="창업마케팅과">창업마케팅과</option>
        <option value="AI게임콘텐츠과">AI게임콘텐츠과</option>
        <option value="소프트웨어개발과">소프트웨어개발과</option>
      </select>
    </div>
  </header>

  <main>
    <!-- HTML: main 태그 안쪽 상단에 추가 -->
    <section id="mobileIntro" class="mobile-intro-area" style="display:none;">
      <div class="intro-slider">
        <!-- 슬라이드 될 이미지 4장 -->
        <div class="intro-slide active"><img src="images/model1.jpg" alt="intro1"></div>
        <div class="intro-slide"><img src="images/model2.jpg" alt="intro2"></div>
        <div class="intro-slide"><img src="images/model3.jpg" alt="intro3"></div>
        <div class="intro-slide"><img src="images/model4.jpg" alt="intro4"></div>
      </div>
      <div class="intro-overlay">
        <p>성일정보고등학교</p>
        <span>잠시 후 학과 선택 화면으로 이동합니다...</span>
      </div>
    </section>

    <section id="mobileMenu" class="mobile-menu-area">
      <p class="menu-notice">알고 싶은 학과를 선택해 주세요!</p>
      <div class="menu-grid">
        <button type="button" class="menu-item" data-dept="학부모진로설명회">학부모진로설명회</button>
        <button type="button" class="menu-item" data-dept="학과체험">학과체험</button>
        <button type="button" class="menu-item" data-dept="뷰티스마트케어과">뷰티스마트케어과</button>
        <button type="button" class="menu-item" data-dept="부사관과">부사관과</button>
        <button type="button" class="menu-item" data-dept="글로벌경영과">글로벌경영과</button>
        <button type="button" class="menu-item" data-dept="회계정보과">회계정보과</button>
        <button type="button" class="menu-item" data-dept="창업마케팅과">창업마케팅과</button>
        <button type="button" class="menu-item" data-dept="AI게임콘텐츠과">AI게임콘텐츠과</button>
        <button type="button" class="menu-item" data-dept="소프트웨어개발과">소프트웨어개발과</button>
      </div>
    </section>

    <section class="board" id="mainBoard">
      <section class="column 학부모진로설명회"><h2>학부모진로설명회</h2></section>
      <section class="column 학과체험"><h2>학과체험</h2></section>
      <section class="column 뷰티스마트케어과"><h2>뷰티스마트케어과</h2></section>
      <section class="column 부사관과"><h2>부사관과</h2></section>
      <section class="column 글로벌경영과"><h2>글로벌경영과</h2></section>
      <section class="column 회계정보과"><h2>회계정보과</h2></section>
      <section class="column 창업마케팅과"><h2>창업마케팅과</h2></section>
      <section class="column AI게임콘텐츠과"><h2>AI게임콘텐츠과</h2></section>
      <section class="column 소프트웨어개발과"><h2>소프트웨어개발과</h2></section>
    </section>
  </main>

  <div id="postModal" class="modal">
    <div class="modal-content">
      <span id="closeModal" class="close">&times;</span>
      <h2 id="modalTitle">게시글 작성</h2>

      <form id="postForm">
        <label>학과 선택</label>
        <select id="dept" required>
          <option value="">선택</option>
          <option value="학부모진로설명회">학부모진로설명회</option>
          <option value="학과체험">학과체험</option>
          <option value="뷰티스마트케어과">뷰티스마트케어과</option>
          <option value="부사관과">부사관과</option>
          <option value="글로벌경영과">글로벌경영과</option>
          <option value="회계정보과">회계정보과</option>
          <option value="창업마케팅과">창업마케팅과</option>
          <option value="AI게임콘텐츠과">AI게임콘텐츠과</option>
          <option value="소프트웨어개발과">소프트웨어개발과</option>
        </select>

        <label>제목</label>
        <input type="text" id="title" placeholder="제목을 입력하세요" required />

        <label>내용</label>
        <div id="quillEditor"></div>

        <label>이미지 첨부</label>
        <p class="image-upload-note">크롭 비율이 16:9로 완화됩니다.</p>
        <button type="button" id="uploadWidgetBtn">이미지 선택 / 자르기</button>
        <img id="previewImage"
          style="display:none; width:100%; height:160px; object-fit:cover; border-radius:8px; margin-top:8px;">
        <button type="button" id="deleteImageBtn"
          style="display:none; margin-top:6px; background:#dc2626;">🗑 이미지 삭제</button>

        <button type="submit" id="submitBtn">등록</button>
      </form>
    </div>
  </div>

  <button id="scrollTopBtn" class="scroll-top-btn"><i class="fa-solid fa-arrow-up"></i></button>

  <script type="module" src="main.js"></script>
</body>
</html>
