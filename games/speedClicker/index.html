<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sungil Space Clicker</title>
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* 기본 네온 & 우주 스타일 리셋 */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        
        body { 
            font-family: 'Gamja Flower', 'Malgun Gothic', sans-serif; 
            background: #030712; 
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; 
        }

        #container { 
            width: 100%; max-width: 450px; height: 100%; 
            background: rgba(11, 15, 30, 0.95); /* 반투명도를 조금 더 올려서 게임판 집중도 향상 */
            
            /* 원래 body에 있던 우주 배경 및 애니메이션을 이쪽으로 이동 */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.3) 2px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.2) 1.5px, transparent 20px),
                radial-gradient(white, rgba(255,255,255,.15) 2px, transparent 25px);
            background-size: 350px 350px, 250px 250px, 150px 150px; /* 모바일 크기에 맞춰 별 밀도 최적화 */
            background-position: 0 0, 30px 40px, 70px 120px;
            animation: starMovement 60s linear infinite; /* 움직임 속도도 모바일에 맞게 살짝 상향 */
            
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column; position: relative; 
            border-left: 1px solid rgba(59, 130, 246, 0.3);
            border-right: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.3); 
        }

        @keyframes starMovement {
            from { background-position: 0 0, 30px 40px, 70px 120px; }
            to { background-position: 350px 350px, 280px 290px, 220px 420px; }
        }
        
        /* 화면 전환 딥페이드인 애니메이션 */
        .screen { 
            display: none; width: 100%; height: 100%; 
            flex-direction: column; justify-content: center; align-items: center; 
            padding: 25px; text-align: center; 
            opacity: 0; transform: scale(0.96); transition: all 0.4s ease-out;
        }
        .screen.active { display: flex; opacity: 1; transform: scale(1); }

        h1 { 
            font-family: 'Orbitron', sans-serif; font-weight: 900;
            color: #fff; text-shadow: 0 0 10px #2563eb, 0 0 20px #3b82f6;
            margin-bottom: 15px; font-size: 32px; letter-spacing: 1px;
        }
        p { color: #9ca3af; margin-bottom: 25px; font-size: 18px; line-height: 1.6; }
        
        /* 사이버 펑크 네온 버튼 */
        .btn { 
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #1e40af, #2563eb); 
            color: white; border: 2px solid #60a5fa; padding: 15px 30px; 
            font-size: 20px; font-weight: bold; border-radius: 30px; cursor: pointer; 
            width: 85%; max-width: 300px; box-shadow: 0 0 15px rgba(37, 99, 235, 0.6);
            transition: all 0.2s ease; animation: pulseGlow 2s infinite;
        }
        .btn:active { transform: scale(0.95); box-shadow: 0 0 5px rgba(37, 99, 235, 0.9); }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 15px rgba(37, 99, 235, 0.5); }
            50% { box-shadow: 0 0 25px rgba(96, 165, 250, 0.8); border-color: #93c5fd; }
            100% { box-shadow: 0 0 15px rgba(37, 99, 235, 0.5); }
        }

        .intro-img { font-size: 70px; margin-bottom: 15px; animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        .global-header { 
            width: auto;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 500; 
        }
        
        /* [CSS 수정] 중학생들이 한눈에 알아보고 누를 수 있는 네온 뱃지 스타일 */
        .sound-toggle-btn { 
            font-family: 'Gamja Flower', sans-serif;
            background: rgba(239, 68, 68, 0.25); /* 기본 음소거 상태는 붉은빛 */
            border: 2px solid #ef4444; 
            border-radius: 20px; 
            padding: 4px 12px;
            font-size: 14px; 
            font-weight: bold;
            cursor: pointer; 
            color: white;
            display: flex; justify-content: center; align-items: center; gap: 5px;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
            transition: all 0.2s;
        }
        /* 사운드가 켜졌을 때: 에메랄드 녹색 네온으로 변경 */
        .sound-toggle-btn.muted { background: rgba(239, 68, 68, 0.25); border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        /* 자바스크립트에서 .muted 클래스를 떼어낼 때 적용될 활성화 스타일 */
        .sound-toggle-btn:not(.muted) { 
            background: rgba(16, 185, 129, 0.3); 
            border-color: #10b981; 
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.6); 
        }

        /* --- 게임화면 HUD 레이아웃 --- */
        #game-hud { width: 90vw; max-width: 380px; margin-bottom: 20px; text-align: left; margin-top: 40px; }
        .timer-container { width: 100%; height: 16px; background: rgba(31, 41, 55, 0.7); border-radius: 8px; overflow: hidden; position: relative; border: 1px solid rgba(156,163,175,0.3); }
        .timer-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #06b6d4, #3b82f6); transition: width 0.1s linear; }
        .timer-urgent { animation: pulseUrgent 0.4s infinite alternate; background: linear-gradient(90deg, #ef4444, #f97316) !important; box-shadow: 0 0 15px #ef4444; }
        @keyframes pulseUrgent { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        .timer-text { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: bold; color: #9ca3af; text-align: right; margin-top: 5px; }

        .score-container { font-family: 'Orbitron', sans-serif; margin-top: 25px; font-size: 26px; font-weight: bold; color: #67e8f9; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .score-num { font-size: 36px; color: #fff; text-shadow: 0 0 15px #06b6d4; display: inline-block; }
        .score-bounce { animation: bounce 0.2s ease-out; }
        @keyframes bounce { 0% { transform: scale(1); } 50% { transform: scale(1.3); color: #22c55e; } 100% { transform: scale(1); } }

        /* 3x3 격자 우주 캡슐 기믹 디자인 */
        .game-board-wrapper { position: relative; width: 90vw; height: 90vw; max-width: 380px; max-height: 380px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 12px; width: 100%; height: 100%; }
        .hole { background: rgba(17, 24, 39, 0.8); border-radius: 18px; position: relative; overflow: hidden; border: 2px solid #1f2937; box-shadow: inset 0 0 15px rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; }
        
        /* 두더지 등장 컴포넌트 */
        .mole { 
            position: absolute; width: 90%; height: 90%; 
            background: linear-gradient(135deg, #1f2937, #111827); 
            border-radius: 14px; display: flex; justify-content: center; align-items: center; 
            padding: 8px; font-size: 14px; font-weight: bold; color: #e5e7eb;
            border: 2px solid #4b5563; box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
            transform: translateY(160%); transition: transform 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; text-align: center; word-break: keep-all; 
        }
        .hole.active .mole { transform: translateY(0); }
        /* 정답 타겟인 경우: 에메랄드 네온 광채 */
        .hole.active .mole.correct { border-color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); color: #a7f3d0; }
        /* 오답 타겟인 경우: 핫핑크 네온 광채 */
        .hole.active .mole.wrong { border-color: #f43f5e; box-shadow: 0 0 15px rgba(244, 63, 94, 0.5); color: #fecdd3; }

        /* 3x3 전체를 가로지르는 고속 도약 이펙트 */
        .full-effect { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; z-index: 100; opacity: 0; }
        .full-effect .symbol { font-family: 'Orbitron', sans-serif; font-size: 180px; font-weight: 900; line-height: 1; }
        .full-effect .score-txt { font-family: 'Orbitron', sans-serif; font-size: 50px; font-weight: bold; margin-top: -15px; }

        .animate-correct { animation: popFadeOutCorrect 0.45s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
        .animate-wrong { animation: popFadeOutWrong 0.45s cubic-bezier(0.19, 1, 0.22, 1) forwards; }

        @keyframes popFadeOutCorrect {
            0% { opacity: 0; transform: scale(0.5); color: rgba(16, 185, 129, 0.9); text-shadow: 0 0 20px #10b981; }
            25% { opacity: 1; transform: scale(1.05); color: rgba(255, 255, 255, 1); text-shadow: 0 0 30px #10b981; }
            100% { opacity: 0; transform: scale(1.35); color: rgba(16, 185, 129, 0); }
        }
        @keyframes popFadeOutWrong {
            0% { opacity: 0; transform: scale(0.5); color: rgba(244, 63, 94, 0.9); text-shadow: 0 0 20px #f43f5e; }
            25% { opacity: 1; transform: scale(1.05); color: rgba(255, 255, 255, 1); text-shadow: 0 0 30px #f43f5e; }
            100% { opacity: 0; transform: scale(1.35); color: rgba(244, 63, 94, 0); }
        }

        /* --- 결과창 및 수집 폼 고도화 --- */
        .result-box { background: rgba(31, 41, 55, 0.5); border: 1px solid rgba(59, 130, 246, 0.2); padding: 18px; border-radius: 20px; width: 95%; margin-bottom: 15px; }
        .final-score { font-family: 'Orbitron', sans-serif; font-size: 40px; color: #38bdf8; text-shadow: 0 0 15px rgba(56, 189, 248, 0.6); font-weight: 900; margin-top: 5px; }
        
        .school-info-title { font-size: 15px; font-weight: bold; color: #34d399; margin: 15px 0 10px 0; text-align: left; padding-left: 5px; text-shadow: 0 0 8px rgba(52, 211, 153, 0.3); }
        .info-badge-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-height: 110px; overflow-y: auto; padding: 8px; background: rgba(17, 24, 39, 0.6); border-radius: 12px; border: 1px solid rgba(156,163,175,0.2); }
        .info-badge { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(52, 211, 153, 0.4); padding: 6px 12px; font-size: 13px; font-weight: bold; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); animation: fadeInUp 0.4s cubic-bezier(0.165, 0.84, 0.44, 1) forwards; opacity: 0; }
        @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(12px); } 100% { opacity: 1; transform: translateY(0); } }

        #result-form-area { width: 95%; max-height: 180px; overflow-y: auto; padding-right: 6px; margin-bottom: 12px; }
        .form-group { width: 100%; text-align: left; margin-bottom: 10px; }
        .form-group label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #9ca3af; }
        .form-group input { 
            width: 100%; padding: 12px; background: rgba(17, 24, 39, 0.8); 
            border: 1px solid #374151; color: white; border-radius: 10px; font-size: 15px; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); transition: all 0.2s;
        }
        .form-group input:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); outline: none; }
        
        .row-group { display: flex; gap: 10px; width: 100%; }
        .agree-box { display: flex; align-items: center; width: 95%; margin: 5px 0 15px 0; font-size: 13px; color: #9ca3af; text-align: left; }
        .agree-box input { margin-right: 8px; width: 18px; height: 18px; cursor: pointer; }

        .welcome-back-msg { background: rgba(37, 99, 235, 0.15); border: 1px dashed #3b82f6; color: #60a5fa; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: bold; margin-bottom: 12px; width: 100%; text-align: center; display: none; }

        #reset-game-btn {
            display: inline-block;
            margin-top: 15px;
            color: #9ca3af; 
            font-size: 15px; 
            text-decoration: underline; 
            cursor: pointer;
            transition: color 0.2s;
        }
        
        /* 커스텀 스크롤바 세팅 (폼, 뱃지 영역용) */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(156, 163, 175, 0.5); }
    </style>
</head>
<body>

<div id="container">

    <div id="screen-start" class="screen active">
        <div class="intro-img">🚀</div>

        <div class="global-header" id="global-header">
            <button id="sound-btn" class="sound-toggle-btn muted" onclick="toggleSound()">🔇</button>
        </div>

        <h1>SUNGIL<br>SPACE CLICKER</h1>
        <p>은하계 탐사 대작전!<br><strong>30초 동안 성일정보고의 대박 장점 행성들만</strong><br>광속으로 터치해 파괴하세요!<br><br><span style="color:#f43f5e; font-weight: bold;">⚠️ 블랙홀 함정 카드는 감점 처리됩니다!</span></p>
        <button class="btn" onclick="startGame()">START MISSION</button>
    </div>

    <div id="screen-game" class="screen">
        <div id="game-hud">
            <div class="timer-container">
                <div id="timer-bar" class="timer-bar"></div>
            </div>
            <div id="timer-text" class="timer-text">TIME: 30.0s</div>
        </div>
        
        <div class="game-board-wrapper">
            <div class="grid" onclick="clickEmptyBoard()">
                <div class="hole" id="h0"><div class="mole" onclick="clickMole(0)"></div></div>
                <div class="hole" id="h1"><div class="mole" onclick="clickMole(1)"></div></div>
                <div class="hole" id="h2"><div class="mole" onclick="clickMole(2)"></div></div>
                <div class="hole" id="h3"><div class="mole" onclick="clickMole(3)"></div></div>
                <div class="hole" id="h4"><div class="mole" onclick="clickMole(4)"></div></div>
                <div class="hole" id="h5"><div class="mole" onclick="clickMole(5)"></div></div>
                <div class="hole" id="h6"><div class="mole" onclick="clickMole(6)"></div></div>
                <div class="hole" id="h7"><div class="mole" onclick="clickMole(7)"></div></div>
                <div class="hole" id="h8"><div class="mole" onclick="clickMole(8)"></div></div>
            </div>
            
            <div id="full-screen-effect" class="full-effect">
                <div id="effect-symbol" class="symbol">O</div>
                <div id="effect-score" class="score-txt">+10</div>
            </div>
        </div>

        <div class="score-container">
            <span>SCORE:</span>
            <span id="score-num" class="score-num">0</span>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h1>MISSION CLEAR</h1>
        <div class="result-box">
            <p>최종 탐사 스코어</p>
            <div class="final-score" id="result-score">0점</div>
            <div class="school-info-title">🛸 데이터 전송 완료된 성일고 인프라 목록</div>
            <div id="school-info-list" class="info-badge-container"></div>
        </div>
        
        <div id="result-form-area">
            <div id="welcome-badge" class="welcome-back-msg">인프라 포트 재연결 완료! 자동 매칭되었습니다. 🔄</div>

            <div class="form-group">
                <label for="student-middle-school">출신 중학교명</label>
                <input type="text" id="student-middle-school" placeholder="예) 성일중학교">
            </div>

            <div class="row-group">
                <div class="form-group">
                    <label for="student-grade">학년</label>
                    <input type="number" id="student-grade" placeholder="3" pattern="[0-9]*" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label for="student-class">반</label>
                    <input type="number" id="student-class" placeholder="5" pattern="[0-9]*" inputmode="numeric">
                </div>
            </div>

            <div class="form-group">
                <label for="student-name">대원 이름</label>
                <input type="text" id="student-name" placeholder="성명을 입력하세요">
            </div>

            <div class="form-group">
                <label for="student-phone">휴대폰 통신 번호</label>
                <input type="tel" id="student-phone" placeholder="하이픈 없이 입력 (01012345678)" inputmode="tel">
            </div>
        </div>
        
        <div class="agree-box">
            <input type="checkbox" id="privacy-agree">
            <label for="privacy-agree">우주 연전 데이터 전송 및 개인정보 수집에 동의합니다.</label>
        </div>

        <button class="btn" id="submit-btn" onclick="submitRanking()">RANKING REGISTRY</button>
        <a href="#" id="reset-game-btn" onclick="resetToMainMenu(); return false;">등록 없이 처음 화면으로 돌아가기</a>
    </div>

</div>

<script>
    // ★ 구글 배포 시 생성된 본인만의 GAS 웹 앱 URL 주소를 입력하세요!
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyaFkeO8wBPnCwqp81-xz6BiWn__8lYwBNz4OlSvq7ISxgUiJky1gpm4yXXJTEXIP8b6g/exec";

    const moleData = {
        correct: [
            "1인 1디바이스 지원", "최신식 컴퓨터 실습실", "대기업/공기업 취업", 
            "존맛탱 명품 급식", "재밌는 동아리 활동", "자격증 취득 지원", 
            "쾌적한 메이커 스페이스", "웹디자인/AI/정보보안"
        ],
        wrong: [
            "노후된 컴퓨터실", "매일 아침 0교시", "두발/복장 불시단속", 
            "칙칙한 분필 칠판", "우주항공학과", "지루한 야간자율학습",
            "매점 없는 학교", "교과서 위주 주입식"
        ]
    };

    let score = 0;
    let timeLeft = 30.0;
    let gameInterval;
    let moleTimeout; 
    let activeMoleIndex = -1;
    let currentMoleType = null; 
    let isSubmitting = false;
    
    // 단계 및 사운드 제어 시스템
    let currentLevel = 1; 
    let currentSpeed = 1000; 
    let isSoundEnabled = false;
    let hasTimeBonusTriggered = false; // 250점 5초 보너스가 중복 적용되는 것 방지용 플래그

    // 사운드 파일 에셋 로드 세팅
    const audioBGM = new Audio('bgm.mp3');
    audioBGM.loop = true;
    audioBGM.volume = 0.5;
    audioBGM.preload = 'auto';

    const audioSuccess = new Audio('success.mp3'); 
    audioSuccess.volume = 0.1;
    audioSuccess.preload = 'auto';

    const audioFail = new Audio('fail.mp3');       
    audioFail.volume = 0.2;
    audioFail.preload = 'auto';

    [audioBGM, audioSuccess, audioFail].forEach(audio => { audio.load(); });

    function toggleSound() {
        const soundBtn = document.getElementById('sound-btn');
        isSoundEnabled = !isSoundEnabled;

        if (isSoundEnabled) {
            soundBtn.innerText = "🔊";
            soundBtn.classList.remove('muted');
            
            audioSuccess.play().then(() => { audioSuccess.pause(); audioSuccess.currentTime = 0; });
            audioFail.play().then(() => { audioFail.pause(); audioFail.currentTime = 0; });
            audioBGM.play().then(() => { audioBGM.pause(); audioBGM.currentTime = 0; });
        } else {
            soundBtn.innerText = "🔇";
            soundBtn.classList.add('muted');
            audioBGM.pause();
        }
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // 게임 시작 시 초기화
    function startGame() {
        score = 0;
        timeLeft = 30.0;
        currentLevel = 1;   
        currentSpeed = 1000; 
        isSubmitting = false;
        hasTimeBonusTriggered = false; // 보너스 플래그 초기화
        
        document.getElementById('score-num').innerText = score;
        updateTimerUI();
        
        document.getElementById('global-header').style.display = 'none';

        if (isSoundEnabled) {
            audioBGM.currentTime = 0;
            audioBGM.play().catch(e => console.log(e));
        }

        showScreen('screen-game');

        gameInterval = setInterval(() => {
            timeLeft -= 0.1;
            if (timeLeft <= 0) {
                timeLeft = 0;
                updateTimerUI();
                endGame();
                return;
            }
            updateTimerUI();
        }, 100);

        popMoleLoop();
    }

    // 🎯 [핵심 수정] 기획안에 맞춘 실시간 점수 기반 단계 및 속도 제어 함수
    function checkLevelSystem() {
        // [250점 기믹] 250점 돌파 시 5초 추가 연출 (딱 한 번만 실행되도록 플래그 처리)
        if (score >= 250 && !hasTimeBonusTriggered) {
            hasTimeBonusTriggered = true;
            timeLeft += 5.0; // 5초 추가
            triggerSpeedUpEffect("TIME BONUS", "+5 SECONDS!");
        }

        // 1단계: 0점 ~ 99점 구간 (속도 1000ms)
        if (score < 100) {
            currentLevel = 1;
            currentSpeed = 1000;
        }
        // 2단계: 100점 ~ 199점 구간 (속도 700ms)
        else if (score >= 100 && score < 200) {
            if (currentLevel !== 2) {
                currentLevel = 2;
                currentSpeed = 700;
                triggerSpeedUpEffect("LEVEL 2", "SPEED UP!");
            }
        } 
        // 3단계: 200점 ~ 299점 구간 (속도 550ms)
        else if (score >= 200 && score < 300) {
            if (currentLevel !== 3) {
                currentLevel = 3;
                currentSpeed = 550;
                triggerSpeedUpEffect("LEVEL 3", "SPEED UP!");
            }
        }
        // 4단계: 300점 ~ 399점 구간 (속도 420ms)
        else if (score >= 300 && score < 400) {
            if (currentLevel !== 4) {
                currentLevel = 4;
                currentSpeed = 420;
                triggerSpeedUpEffect("LEVEL 4", "SPEED UP!");
            }
        }
        // 5단계: 400점 이상 최종 보너스 스퍼트 모드 (속도 330ms)
        else if (score >= 400) {
            if (currentLevel !== 5) {
                currentLevel = 5;
                currentSpeed = 330;
                triggerSpeedUpEffect("BONUS MODE", "GOD SPEED!!!");
            }
        }
    }

    function triggerSpeedUpEffect(titleText, subText) {
        const effectLayer = document.getElementById('full-screen-effect');
        const effectSymbol = document.getElementById('effect-symbol');
        const effectScore = document.getElementById('effect-score');

        effectLayer.classList.remove('animate-correct', 'animate-wrong');
        void effectLayer.offsetWidth; 

        effectSymbol.innerText = titleText;
        effectSymbol.style.fontSize = "45px"; 
        effectSymbol.style.color = "#f59e0b"; 
        effectSymbol.style.textShadow = "0 0 20px #f59e0b, 0 0 40px #d97706";

        effectScore.innerText = subText;
        effectScore.style.color = "#fff";
        effectScore.style.fontSize = "32px";
        effectScore.style.textShadow = "0 0 15px #f43f5e"; 

        effectLayer.classList.add('animate-correct');

        setTimeout(() => {
            effectSymbol.style.fontSize = "";
            effectSymbol.style.color = "";
            effectSymbol.style.textShadow = "";
            effectScore.style.color = "";
            effectScore.style.fontSize = "";
            effectScore.style.textShadow = "";
        }, 500);
    }

    function updateTimerUI() {
        const percentage = (timeLeft / 35) * 100; // 5초 추가 대응을 고려한 비율 계산
        const barElement = document.getElementById('timer-bar');
        
        barElement.style.width = `${Math.min(100, percentage)}%`;
        
        // 상단 UI 배너에 레벨(LV) 표기
        let lvText = `LV.${currentLevel}`;
        if (currentLevel === 5) lvText = "BONUS";
        document.getElementById('timer-text').innerText = `${lvText} | TIME: ${timeLeft.toFixed(1)}s`;
        
        if (timeLeft <= 10.0) {
            barElement.classList.add('timer-urgent');
        } else {
            barElement.classList.remove('timer-urgent');
        }
    }

    function popMoleLoop() {
        if (timeLeft <= 0) return;

        if (activeMoleIndex !== -1) {
            document.getElementById(`h${activeMoleIndex}`).classList.remove('active');
        }

        activeMoleIndex = Math.floor(Math.random() * 9);
        currentMoleType = Math.random() > 0.3 ? 'correct' : 'wrong';
        
        const list = moleData[currentMoleType];
        const text = list[Math.floor(Math.random() * list.length)];

        const holeElement = document.getElementById(`h${activeMoleIndex}`);
        const moleElement = holeElement.querySelector('.mole');
        
        moleElement.innerText = text;
        moleElement.className = `mole ${currentMoleType}`;
        holeElement.classList.add('active');

        moleTimeout = setTimeout(popMoleLoop, currentSpeed);
    }

    // 🎯 [핵심 수정] 레벨별 점수 업/다운 연산 기믹 정밀 제어
    function clickMole(index) {
        const event = window.event || arguments.callee.caller.arguments[0];
        if (event) event.stopPropagation(); 

        const holeElement = document.getElementById(`h${index}`);
        if (index !== activeMoleIndex || !holeElement.classList.contains('active')) return;

        holeElement.classList.remove('active');
        
        const effectLayer = document.getElementById('full-screen-effect');
        const effectSymbol = document.getElementById('effect-symbol');
        const effectScore = document.getElementById('effect-score');
        const scoreNumElement = document.getElementById('score-num');

        effectLayer.classList.remove('animate-correct', 'animate-wrong');
        void effectLayer.offsetWidth; 

        let calculatedPlus = 0;
        let calculatedMinus = 0;

        // 1. 레벨별 동적 배점 할당 시스템 계산
        if (currentLevel === 1) {
            calculatedPlus = 10;
            calculatedMinus = 5;
        } else if (currentLevel === 2) {
            calculatedPlus = 15;
            calculatedMinus = 10;
        } else if (currentLevel === 3) {
            calculatedPlus = 20;
            calculatedMinus = 20; // 맞추면 +20, 틀려도 -20 (동일 대칭)
        } else if (currentLevel === 4) {
            calculatedPlus = 40;
            calculatedMinus = 25;
        } else if (currentLevel === 5) {
            calculatedPlus = 50;
            calculatedMinus = 0; // 400점 이상 보너스 모드: 감점 패널티 완전 없음
        }

        // 2. 점수 적용 및 폰 피드백 연출
        if (currentMoleType === 'correct') {
            score += calculatedPlus;
            
            effectSymbol.innerText = "O";
            effectScore.innerText = `+${calculatedPlus}`;
            effectLayer.classList.add('animate-correct');
            
            if (isSoundEnabled) {
                audioSuccess.currentTime = 0;
                audioSuccess.play().catch(e => {});
            }
        } else {
            score = Math.max(0, score - calculatedMinus);
            
            effectSymbol.innerText = "X";
            effectScore.innerText = calculatedMinus === 0 ? "MISS" : `-${calculatedMinus}`;
            effectLayer.classList.add('animate-wrong');
            
            if (isSoundEnabled) {
                audioFail.currentTime = 0;
                audioFail.play().catch(e => {});
                setTimeout(() => { audioFail.pause(); audioFail.currentTime = 0; }, 250); 
            }
        }

        scoreNumElement.innerText = score;
        
        // 연산이 일어난 직후 레벨 변동 여부 갱신 체크
        checkLevelSystem(); 

        scoreNumElement.classList.add('score-bounce');
        setTimeout(() => { scoreNumElement.classList.remove('score-bounce'); }, 200);
    }

    // 🎯 [핵심 수정] 격자판 오 클릭(빈칸 터치) 시 전 구간 동일하게 -1점 패널티 처리
    function clickEmptyBoard() {
        if (timeLeft <= 0 || document.getElementById('screen-game').classList.contains('active') === false) return;

        score = Math.max(0, score - 1); // 빈 칸 터치 시 -1점

        const scoreNumElement = document.getElementById('score-num');
        scoreNumElement.innerText = score;

        // 감점을 알려주는 빨간 점수 라이팅 피드백
        scoreNumElement.style.color = "#ef4444";
        setTimeout(() => { scoreNumElement.style.color = ""; }, 150);

        // 실시간 레벨 체크 (감점으로 하위 레벨 롤백 가능 지원)
        checkLevelSystem();

        if (isSoundEnabled) {
            audioFail.currentTime = 0;
            audioFail.play().catch(e => {});
            setTimeout(() => { audioFail.pause(); audioFail.currentTime = 0; }, 120);
        }
    }

    function endGame() {
        clearInterval(gameInterval);
        clearTimeout(moleTimeout);
        
        audioBGM.pause(); 

        if (activeMoleIndex !== -1) {
            document.getElementById(`h${activeMoleIndex}`).classList.remove('active');
        }

        document.getElementById('result-score').innerText = `${score}점`;
        
        const infoListContainer = document.getElementById('school-info-list');
        infoListContainer.innerHTML = ""; 
        moleData.correct.forEach((text, index) => {
            const badge = document.createElement('div');
            badge.className = 'info-badge';
            badge.innerText = text;
            badge.style.animationDelay = `${index * 0.05}s`; 
            infoListContainer.appendChild(badge);
        });

        const savedInfo = localStorage.getItem('sungil_student_info');
        const welcomeBadge = document.getElementById('welcome-badge');
        
        if (savedInfo) {
            const info = JSON.parse(savedInfo);
            document.getElementById('student-middle-school').value = info.middleSchool || "";
            document.getElementById('student-grade').value = info.grade || "";
            document.getElementById('student-class').value = info.classNum || "";
            document.getElementById('student-name').value = info.name || "";
            document.getElementById('student-phone').value = info.phone || "";
            document.getElementById('privacy-agree').checked = true; 
            welcomeBadge.style.display = "block"; 
        } else {
            welcomeBadge.style.display = "none";
        }

        showScreen('screen-result');
    }

    function submitRanking() {
        if (isSubmitting) return;

        const middleSchool = document.getElementById('student-middle-school').value.trim();
        const grade = document.getElementById('student-grade').value.trim();
        const classNum = document.getElementById('student-class').value.trim();
        const name = document.getElementById('student-name').value.trim();
        let phone = document.getElementById('student-phone').value.trim();
        const agree = document.getElementById('privacy-agree').checked;

        if (!middleSchool || !grade || !classNum || !name || !phone) {
            alert("모든 제어 시스템 항목을 빈칸 없이 입력 완료해 주세요.");
            return;
        }
        if (!agree) {
            alert("랭킹 등록 및 개인정보 전송 승인에 체크해 주세요.");
            return;
        }

        phone = phone.replace(/[^0-9]/g, '');
        if (phone.startsWith('10') && phone.length === 10) {
            phone = '0' + phone;
        }
        if (phone.length === 11) {
            phone = phone.replace(/(\d{3})(\d{4})(\d{4})/, '$1-$2-$3');
        } else if (phone.length === 10) {
            phone = phone.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3');
        } else {
            alert("휴대폰 양식이 올바르지 않습니다. 다시 검토하세요.");
            return;
        }

        isSubmitting = true;
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.innerText = "DATA TRANSMITTING...";
        submitBtn.style.background = "#4b5563";

        const payload = {
            middleSchool: middleSchool,
            grade: grade,
            classNum: classNum,
            name: name,
            phone: phone,
            score: score
        };

        fetch(GAS_WEB_APP_URL, {
            method: "POST",
            mode: "no-cors", 
            headers: { "Content-Type": "text/plain" }, 
            body: JSON.stringify(payload)
        })
        .then(() => {
            localStorage.setItem('sungil_student_info', JSON.stringify(payload));
            alert("성공적으로 서버 메인 데이터베이스에 기록되었습니다! 🛰️");
            location.reload(); 
        })
        .catch(err => {
            console.error(err);
            alert("데이터 전송 주파수 에러 발생. 담당 교사에게 보고하세요.");
            isSubmitting = false;
            submitBtn.innerText = "RANKING REGISTRY";
            submitBtn.style.background = "#2563eb";
        });
    }

    function resetToMainMenu() {
        clearInterval(gameInterval);
        clearTimeout(moleTimeout);
        audioBGM.pause();
        audioBGM.currentTime = 0;
        document.getElementById('global-header').style.display = 'flex';
        location.reload();
    }
</script>
