<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>응원 메시지 남기기</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        body { background-color: #e9e9e9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .memo-container { background-color: #fff740; width: 100%; max-width: 350px; padding: 30px; box-shadow: 10px 10px 20px rgba(0,0,0,0.15); position: relative; border-bottom-right-radius: 60px 5px; transform: rotate(-1deg); }
        h2 { font-family: 'Nanum Pen Script', cursive; font-size: 2rem; color: #333; margin-top: 0; text-align: center; border-bottom: 2px solid rgba(0,0,0,0.1); padding-bottom: 10px; }
        .input-group { margin-top: 20px; }
        label { display: block; font-family: 'Nanum Pen Script', cursive; font-size: 1.2rem; margin-bottom: 5px; color: #666; }
        input, textarea { width: 100%; border: none; background: transparent; background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px); background-size: 100% 1.5em; line-height: 1.5em; font-family: 'Nanum Pen Script', cursive; font-size: 1.5rem; color: #444; outline: none; padding: 5px; box-sizing: border-box; }
        input:focus::placeholder, textarea:focus::placeholder { color: transparent; }
        button { margin-top: 30px; width: 100%; padding: 12px; background-color: #333; color: white; border: none; border-radius: 5px; font-family: 'Nanum Pen Script', cursive; font-size: 1.4rem; cursor: pointer; }
    </style>
</head>
<body>
<div class="memo-container">
    <h2>💌 응원 메시지</h2>
    <div class="input-group">
        <label>보내는 사람 (최대 10자)</label>
        <input type="text" id="name" maxlength="10" placeholder="이름을 적어주세요" autocomplete="off">
    </div>
    <div class="input-group">
        <label>내용 (최대 70자)</label>
        <textarea id="content" maxlength="70" placeholder="따뜻한 한마디를 남겨주세요"></textarea>
    </div>
    <button onclick="send()">전송하기</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyDZG5lEbpFfgpKlKNnQ2dVR6TgnCN-g9hujI5DyrTQx-Qw7hGqmYgJixLwScoFyL8_0w/exec"; 
    function send() {
        const name = document.getElementById('name').value;
        const content = document.getElementById('content').value;
        const btn = document.querySelector('button');
        if(!name || !content) { alert("내용을 입력해주세요!"); return; }
        btn.disabled = true; btn.innerText = "전송 중...";
        fetch(API_URL, { method: "POST", body: JSON.stringify({ name: name, content: content }) })
        .then(res => res.json()).then(() => {
            alert("전달되었습니다!"); location.reload();
        }).catch(() => { alert("오류 발생"); btn.disabled = false; });
    }
</script>
</body>
</html>
