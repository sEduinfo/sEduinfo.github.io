<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026년 성일정보고 축제</title>
    <style>
        /* 기본 초기화 및 스마트폰 뷰 세팅 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto; 
            font-family: 'Malgun Gothic', sans-serif;
            padding: 0 10px 10px 10px; /* 상단 패딩은 타이틀바가 대체하므로 0으로 조정 */
        }

        /* [추가] 모바일 화면 최상단 고정 타이틀 바 */
        .mobile-header {
            position: sticky;
            top: 0;
            left: 0;
            width: calc(100% + 20px); /* body의 좌우 마진을 상쇄하기 위한 크기 */
            margin-left: -10px; /* body 패딩 맞춤 조절 */
            background: linear-gradient(135deg, #1e1b4b, #311042); /* 비디오월과 통일감을 주는 딥 퍼플 그라데이션 */
            padding: 16px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            z-index: 500; /* 포스터 그리드보다는 위, 모달 팝업보다는 아래 배치 */
            margin-bottom: 15px;
            border-bottom: 1px solid #4c1d95;
        }

        .mobile-header h1 {
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
        }

        /* 사진첩 앱처럼 가로 3개씩 고정하는 그리드 컨테이너 */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            width: 100%;
        }

        /* 개별 포스터 항목 래퍼 */
        .gallery-item {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1.3; 
            background-color: #111;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .gallery-item:active {
            transform: scale(0.95); 
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        /* 전체 화면으로 띄워줄 모달 팝업 레이아웃 */
        .fullscreen-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.95); 
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .fullscreen-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .fullscreen-modal img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
            border-radius: 4px;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .fullscreen-modal.active img {
            transform: scale(1); 
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ffffff;
            font-size: 2rem;
            font-weight: 300;
            cursor: pointer;
            z-index: 1010;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <header class="mobile-header">
        <h1>성일정보고 축제의 시작!!</h1>
    </header>

    <div class="gallery-container">
        <div class="gallery-item"><img src="posters/1.jpg" alt="부스 1"></div>

        <div class="gallery-item"><img src="posters/3.jpg" alt="부스 3"></div>

        <div class="gallery-item"><img src="posters/8.jpg" alt="부스 8"></div>
        <div class="gallery-item"><img src="posters/9.jpg" alt="부스 9"></div>
        <div class="gallery-item"><img src="posters/10.jpg" alt="부스 10"></div>

        <div class="gallery-item"><img src="posters/12.png" alt="부스 12"></div>

        <div class="gallery-item"><img src="posters/20.jpg" alt="부스 20"></div>

        <div class="gallery-item"><img src="posters/33.jpg" alt="부스 33"></div>
    </div>

    <div class="fullscreen-modal" id="photoModal">
        <div class="close-btn">&times;</div>
        <img src="" id="modalImg" alt="확대 포스터">
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const items = document.querySelectorAll(".gallery-item");
            const modal = document.getElementById("photoModal");
            const modalImg = document.getElementById("modalImg");

            items.forEach(item => {
                item.addEventListener("click", () => {
                    const originSrc = item.querySelector("img").getAttribute("src");
                    modalImg.setAttribute("src", originSrc);
                    modal.classList.add("active");
                });
            });

            modal.addEventListener("click", () => {
                modal.classList.remove("active");
                setTimeout(() => {
                    modalImg.setAttribute("src", "");
                }, 300);
            });
        });
    </script>
</body>
</html>
