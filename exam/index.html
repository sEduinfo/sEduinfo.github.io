<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>성일정보고 수행평가 알림판</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #f1f2f6; /* 배경색 통일 */
            overflow: hidden; /* 바깥쪽 스크롤 방지 */
        }
        .container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            -webkit-overflow-scrolling: touch; /* iOS 부드러운 스크롤 */
            overflow-y: auto;
        }
        iframe {
            display: block; width: 100%; height: 100%;
            border: none; margin: 0; padding: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe src="https://script.google.com/macros/s/AKfycbwVwjlm5dUBxCbkytsa-yHy8EOle3qyzsvLcALmXc7zzhOqGnAtvgBMQsogw_upYwGQ/exec" allowfullscreen></iframe>
    </div>
</body>
</html>
